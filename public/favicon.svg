<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#12122a"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="url(#bgGrad)" stroke="#00ffff" stroke-width="0.8" opacity="0.7"/>

  <!-- Pet face -->
  <circle cx="16" cy="16" r="9" fill="#ffaa44" filter="url(#glow)"/>

  <!-- Eyes -->
  <circle cx="12.5" cy="14" r="2.2" fill="white"/>
  <circle cx="19.5" cy="14" r="2.2" fill="white"/>
  <circle cx="13" cy="14.3" r="1.3" fill="#222244"/>
  <circle cx="20" cy="14.3" r="1.3" fill="#222244"/>
  <circle cx="13.5" cy="13.8" r="0.5" fill="white"/>
  <circle cx="20.5" cy="13.8" r="0.5" fill="white"/>

  <!-- Smile -->
  <path d="M12 18.5 Q16 22 20 18.5" stroke="#222244" stroke-width="1.2" fill="none" stroke-linecap="round"/>

  <!-- Sparkles -->
  <circle cx="5" cy="7" r="1" fill="#00ffff" opacity="0.8" filter="url(#glow)"/>
  <circle cx="27" cy="9" r="0.8" fill="#ff00ff" opacity="0.7" filter="url(#glow)"/>
  <circle cx="26" cy="25" r="0.7" fill="#00ff88" opacity="0.8" filter="url(#glow)"/>
  <circle cx="6" cy="24" r="0.9" fill="#ffaa00" opacity="0.7" filter="url(#glow)"/>
</svg>
